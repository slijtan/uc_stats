<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1a56db"/>
  <!-- Three ascending bar chart bars -->
  <rect x="6" y="18" width="5" height="9" rx="1" fill="#93bbfd"/>
  <rect x="13.5" y="13" width="5" height="14" rx="1" fill="#60a5fa"/>
  <rect x="21" y="7" width="5" height="20" rx="1" fill="#fff"/>
  <!-- Trend line across the bars -->
  <polyline points="8.5,17 16,12 23.5,6" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dot accents on the trend line -->
  <circle cx="8.5" cy="17" r="1.5" fill="#fbbf24"/>
  <circle cx="16" cy="12" r="1.5" fill="#fbbf24"/>
  <circle cx="23.5" cy="6" r="1.5" fill="#fbbf24"/>
</svg>
